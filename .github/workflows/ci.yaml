name: CI Pipeline

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]
    workflow_dispatch:

env:
    NODE_VERSION: 20

jobs:
    test:
        name: Project Test
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7
            - name: Use Node.js ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v7
              with:
                node-version: ${{ env.NODE_VERSION }}
            - name: Install dependencies
              run: npm ci
            - name: Run tests
              run: npm test
            - name: Run lint
              run: npm run lint
    
    docker-frontend-build:
        name: Docker Frontend Build
        runs-on: ubuntu-24.04
        needs: [test, docker-backend-build]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Log in to DockerHub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                context: .
                file: .docker/frontend/Dockerfile
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/instagram_clone_frontend:latest
                build-args: |
                    VITE_GOOGLE_AUTH_URI=${{ vars.VITE_GOOGLE_AUTH_URI }}
                    VITE_FACEBOOK_AUTH_URI=${{ vars.VITE_FACEBOOK_AUTH_URI }}
                    VITE_SOCKET_CLIENT_URL=${{ vars.VITE_SOCKET_CLIENT_URL }}
                    FRONT_END_URL=${{ vars.FRONT_END_URL }}
                    BACK_END_URL=${{ vars.BACK_END_URL }}
            - name: Run Trivy Scan on Frontend Image
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: ${{ secrets.DOCKER_USERNAME }}/instagram_clone_frontend:latest
    
    docker-backend-build:
        name: Docker Backend Build
        runs-on: ubuntu-24.04
        needs: test
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Log in to DockerHub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                context: .
                file: .docker/backend/Dockerfile
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/instagram_clone_backend:latest
                build-args: |
                    EXPRESS_PORT=${{ vars.EXPRESS_PORT }}
                    GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
                    GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
                    FACEBOOK_CLIENT_ID=${{ secrets.FACEBOOK_CLIENT_ID }}
                    FACEBOOK_CLIENT_SECRET=${{ secrets.FACEBOOK_CLIENT_SECRET }}
                    JWT_SECRET=${{ secrets.JWT_SECRET }}
                    SESSION_SECRET=${{ secrets.SESSION_SECRET }}
                    MONGODB_URI=${{ secrets.MONGODB_URI }}
                    OFFLINE_MONGODB_URI=${{ vars.OFFLINE_MONGODB_URI }}
            - name: Run Trivy Scan on Backend Image
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: ${{ secrets.DOCKER_USERNAME }}/instagram_clone_backend:latest
            - name: Docker Logout
              run: docker logout