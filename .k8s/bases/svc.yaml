apiVersion: v1
kind: Service
metadata:
  name: instagram_clone_frontend_service
  namespace: dev
spec:
  type: NodePort
  selector:
    app: instagram_clone
    tier: frontend
  ports:
    - port: 80
      nodePort: 31275
      targetPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: instagram_clone_backend_service
  namespace: dev
spec:
  type: ClusterIP
  selector:
    app: instagram_clone
    tier: backend
  ports:
    - port: 8000
      targetPort: 8000
      name: "instagram_clone_backend_service_port"