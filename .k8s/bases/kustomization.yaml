apiVersion: kustomize.config.k8s.io/v1
kind: Kustomization
labels:
  - includeSelectors: true
    pairs:
      app: instagram_clone

resources:
  - deployment.yaml
  - hpa.yaml
  - vpa.yaml
  - ingress.yaml
  - networkpolicy.yaml
  - pvc.yaml
  - sc.yaml
  - svc.yaml
  - pdb.yaml
  - argocd.yaml
  - monitoring.yaml

configMapGenerator:
  - name: instagram_clone_config
    envs:
      - configs.env

secretGenerator:
  - name: instagram_clone_secret
    envs:
      - secrets.env